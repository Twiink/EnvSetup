name: E2E Real Install

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  # ============================================================
  # Job 1: Unit + Integration tests (vitest, mock plugins)
  # Runs fast mock-based tests for all tools.
  # Real-install tests are SKIPPED here (ENVSETUP_REAL_RUN not set).
  # ============================================================
  unit:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit and integration tests (mock-based)
        run: npm test
        timeout-minutes: 10

  # ============================================================
  # Job 2: Real installation + rollback integration tests (vitest)
  # Uses REAL plugins with dryRun=false. Downloads real artifacts,
  # runs real shell commands, verifies installed binaries, then
  # executes real rollback for both fresh-install and cleanup→install flows.
  # Covers:
  #   Node (direct+nvm), Java (jdk+sdkman), Python (conda+direct),
  #   Git (direct+homebrew/scoop with package-manager uninstall rollback)
  # ============================================================
  real-install:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
        tool: [node, java, python, git]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    env:
      ENVSETUP_DOWNLOAD_CACHE_DIR: ${{ github.workspace }}/.envsetup-cache/downloads/${{ runner.os }}-${{ matrix.tool }}
      ENVSETUP_EXTRACTED_CACHE_DIR: ${{ github.workspace }}/.envsetup-cache/extracted/${{ runner.os }}-${{ matrix.tool }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Restore EnvSetup artifact caches
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ENVSETUP_DOWNLOAD_CACHE_DIR }}
            ${{ env.ENVSETUP_EXTRACTED_CACHE_DIR }}
          key: envsetup-artifacts-${{ runner.os }}-${{ matrix.tool }}-${{ hashFiles('package-lock.json', 'src/main/core/download.ts', 'src/main/core/archiveCache.ts', 'src/main/plugins/nodeEnvPlugin.ts', 'src/main/plugins/javaEnvPlugin.ts', 'src/main/plugins/pythonEnvPlugin.ts', 'src/main/plugins/gitEnvPlugin.ts', 'tests/integration/action-real-cycle-matrix.test.ts', '.github/workflows/e2e-real-install.yml') }}
          restore-keys: |
            envsetup-artifacts-${{ runner.os }}-${{ matrix.tool }}-
            envsetup-artifacts-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Run real install + rollback matrix
        env:
          ENVSETUP_REAL_RUN: '1'
          ENVSETUP_CI_TOOL: ${{ matrix.tool }}
        run: npm run test:integration:real -- --reporter=verbose
        timeout-minutes: 80

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: real-install-logs-${{ matrix.os }}-${{ matrix.tool }}
          path: |
            tests/integration/
            /tmp/envsetup-real-*
            test-results/
          if-no-files-found: ignore
          retention-days: 7

  # ============================================================
  # Job 3: Packaged-app E2E smoke tests
  # Builds the unpacked application bundle first, then verifies one
  # representative real install + rollback flow through the packaged
  # Electron binary. The full manager/platform matrix stays in the
  # real-install integration job above.
  # ============================================================
  e2e:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.playwright-browsers/${{ runner.os }}
      ENVSETUP_DOWNLOAD_CACHE_DIR: ${{ github.workspace }}/.envsetup-cache/downloads/${{ runner.os }}-packaged
      ENVSETUP_EXTRACTED_CACHE_DIR: ${{ github.workspace }}/.envsetup-cache/extracted/${{ runner.os }}-packaged
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Restore Playwright browser cache
        uses: actions/cache@v4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: playwright-browsers-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-browsers-${{ runner.os }}-

      - name: Restore EnvSetup artifact caches
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ENVSETUP_DOWNLOAD_CACHE_DIR }}
            ${{ env.ENVSETUP_EXTRACTED_CACHE_DIR }}
          key: envsetup-packaged-artifacts-${{ runner.os }}-${{ hashFiles('package-lock.json', 'src/main/core/download.ts', 'src/main/core/archiveCache.ts', 'src/main/plugins/nodeEnvPlugin.ts', 'src/main/plugins/javaEnvPlugin.ts', 'src/main/plugins/pythonEnvPlugin.ts', 'src/main/plugins/gitEnvPlugin.ts', 'tests/e2e/real-install.spec.ts', '.github/workflows/e2e-real-install.yml') }}
          restore-keys: |
            envsetup-packaged-artifacts-${{ runner.os }}-
            envsetup-artifacts-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build unpacked packaged app
        run: npm run pack

      - name: Run E2E real install + rollback against packaged app
        env:
          ENVSETUP_REAL_RUN: '1'
          ENVSETUP_PACKAGED_RUN: '1'
        run: npm run test:e2e:packaged
        timeout-minutes: 45

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-results-${{ matrix.os }}
          path: test-results/
          retention-days: 7

      - name: Upload task logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: task-logs-${{ matrix.os }}
          path: |
            test-results/envsetup-real-*-data/tasks/
            test-results/envsetup-real-*-data/*.log
          if-no-files-found: ignore
          retention-days: 7
