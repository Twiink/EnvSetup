# 运行 EnvSetup 的 CI 工作流，覆盖真实安装、清理与回滚场景。

name: E2E Real Install

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  # ============================================================
  # Job 1：单元测试 + 集成测试（Vitest，mock 插件）
  # 这里运行的是快速的 mock 流程，不执行真实安装。
  # 未设置 ENVSETUP_REAL_RUN，因此真实安装测试会被跳过。
  # ============================================================
  unit:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit and integration tests (mock-based)
        run: npm test
        timeout-minutes: 10

  # ============================================================
  # Job 2：真实安装 + 回滚集成测试（Vitest）
  # 这里使用 dryRun=false 的真实插件，下载真实工件、执行真实命令、
  # 校验安装结果，并覆盖全新安装与“清理后再安装”两类回滚路径。
  # 覆盖 Node、Java、Python、Git、MySQL、Redis、Maven 的真实安装、
  # 清理与回滚链路，其中 MySQL/Redis 为包管理器流，Maven 为官方归档直装。
  # ============================================================
  real-install:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            tool: node
            tool_version: 24.13.1
            version_id: 24-13-1
          - os: macos-latest
            tool: node
            tool_version: 22.22.1
            version_id: 22-22-1
          - os: macos-latest
            tool: java
            tool_version: 21.0.6+7
            version_id: 21-0-6-7
          - os: macos-latest
            tool: java
            tool_version: 17.0.14+7
            version_id: 17-0-14-7
          - os: macos-latest
            tool: python
            tool_version: 3.13.4
            version_id: 3-13-4
          - os: macos-latest
            tool: python
            tool_version: 3.12.10
            version_id: 3-12-10
          - os: macos-latest
            tool: git
            tool_version: 2.33.0
            version_id: 2-33-0
          - os: macos-latest
            tool: git
            tool_version: 2.32.0
            version_id: 2-32-0
          - os: macos-latest
            tool: mysql
            tool_version: 8.4.8
            version_id: 8-4-8
          - os: macos-latest
            tool: mysql
            tool_version: 8.4.7
            version_id: 8-4-7
          - os: macos-latest
            tool: redis
            tool_version: 7.4.7
            version_id: 7-4-7
          - os: macos-latest
            tool: redis
            tool_version: 7.4.6
            version_id: 7-4-6
          - os: macos-latest
            tool: maven
            tool_version: 3.9.11
            version_id: 3-9-11
          - os: macos-latest
            tool: maven
            tool_version: 3.9.10
            version_id: 3-9-10
          - os: windows-latest
            tool: node
            tool_version: 24.13.1
            version_id: 24-13-1
          - os: windows-latest
            tool: node
            tool_version: 22.22.1
            version_id: 22-22-1
          - os: windows-latest
            tool: java
            tool_version: 21.0.6+7
            version_id: 21-0-6-7
          - os: windows-latest
            tool: java
            tool_version: 17.0.14+7
            version_id: 17-0-14-7
          - os: windows-latest
            tool: python
            tool_version: 3.13.4
            version_id: 3-13-4
          - os: windows-latest
            tool: python
            tool_version: 3.12.10
            version_id: 3-12-10
          - os: windows-latest
            tool: git
            tool_version: 2.49.1
            version_id: 2-49-1
          - os: windows-latest
            tool: git
            tool_version: 2.48.2
            version_id: 2-48-2
          - os: windows-latest
            tool: mysql
            tool_version: 8.4.8
            version_id: 8-4-8
          - os: windows-latest
            tool: mysql
            tool_version: 8.4.7
            version_id: 8-4-7
          # Windows Redis 直装当前仅能从官方 Memurai LTS 页面拿到 7.4.7 对应安装器。
          - os: windows-latest
            tool: redis
            tool_version: 7.4.7
            version_id: 7-4-7
          - os: windows-latest
            tool: maven
            tool_version: 3.9.11
            version_id: 3-9-11
          - os: windows-latest
            tool: maven
            tool_version: 3.9.10
            version_id: 3-9-10
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    env:
      ENVSETUP_DOWNLOAD_CACHE_DIR: ${{ github.workspace }}/.envsetup-cache/downloads/${{ matrix.os }}-${{ matrix.tool }}-${{ matrix.version_id }}
      ENVSETUP_EXTRACTED_CACHE_DIR: ${{ github.workspace }}/.envsetup-cache/extracted/${{ matrix.os }}-${{ matrix.tool }}-${{ matrix.version_id }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Restore EnvSetup artifact caches
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ENVSETUP_DOWNLOAD_CACHE_DIR }}
            ${{ env.ENVSETUP_EXTRACTED_CACHE_DIR }}
          key: envsetup-artifacts-${{ matrix.os }}-${{ matrix.tool }}-${{ matrix.version_id }}-${{ hashFiles('package-lock.json', 'src/main/core/download.ts', 'src/main/core/archiveCache.ts', 'src/main/core/gitVersions.ts', 'src/main/core/mysqlVersions.ts', 'src/main/core/redisVersions.ts', 'src/main/plugins/nodeEnvPlugin.ts', 'src/main/plugins/javaEnvPlugin.ts', 'src/main/plugins/pythonEnvPlugin.ts', 'src/main/plugins/gitEnvPlugin.ts', 'src/main/plugins/mysqlEnvPlugin.ts', 'src/main/plugins/redisEnvPlugin.ts', 'src/main/plugins/mavenEnvPlugin.ts', 'tests/integration/action-real-cycle-matrix.test.ts', 'tests/integration/action-real-rollback-matrix.test.ts', '.github/workflows/e2e-real-install.yml') }}
          restore-keys: |
            envsetup-artifacts-${{ matrix.os }}-${{ matrix.tool }}-${{ matrix.version_id }}-
            envsetup-artifacts-${{ matrix.os }}-${{ matrix.tool }}-
            envsetup-artifacts-${{ matrix.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Run real install + rollback matrix
        env:
          ENVSETUP_REAL_RUN: '1'
          ENVSETUP_CI_TOOL: ${{ matrix.tool }}
          ENVSETUP_CI_VERSION: ${{ matrix.tool_version }}
        run: npm run test:integration:real -- --reporter=verbose
        timeout-minutes: 80

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: real-install-logs-${{ matrix.os }}-${{ matrix.tool }}-${{ matrix.version_id }}
          path: |
            tests/integration/
            /tmp/envsetup-real-*
            test-results/
          if-no-files-found: ignore
          retention-days: 7

  # ============================================================
  # Job 3：打包应用 E2E 冒烟测试
  # 先构建 unpacked 应用，再通过打包后的 Electron 二进制验证一条
  # 代表性的真实安装 + 回滚链路；完整矩阵仍由上面的 real-install 任务负责。
  # ============================================================
  e2e:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.playwright-browsers/${{ matrix.os }}
      ENVSETUP_DOWNLOAD_CACHE_DIR: ${{ github.workspace }}/.envsetup-cache/downloads/${{ matrix.os }}-packaged
      ENVSETUP_EXTRACTED_CACHE_DIR: ${{ github.workspace }}/.envsetup-cache/extracted/${{ matrix.os }}-packaged
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Restore Playwright browser cache
        uses: actions/cache@v4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: playwright-browsers-${{ matrix.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-browsers-${{ matrix.os }}-

      - name: Restore EnvSetup artifact caches
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ENVSETUP_DOWNLOAD_CACHE_DIR }}
            ${{ env.ENVSETUP_EXTRACTED_CACHE_DIR }}
          key: envsetup-packaged-artifacts-${{ matrix.os }}-${{ hashFiles('package-lock.json', 'src/main/core/download.ts', 'src/main/core/archiveCache.ts', 'src/main/plugins/nodeEnvPlugin.ts', 'src/main/plugins/javaEnvPlugin.ts', 'src/main/plugins/pythonEnvPlugin.ts', 'src/main/plugins/gitEnvPlugin.ts', 'src/main/plugins/mysqlEnvPlugin.ts', 'src/main/plugins/redisEnvPlugin.ts', 'src/main/plugins/mavenEnvPlugin.ts', 'tests/e2e/real-install.spec.ts', '.github/workflows/e2e-real-install.yml') }}
          restore-keys: |
            envsetup-packaged-artifacts-${{ matrix.os }}-
            envsetup-artifacts-${{ matrix.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build unpacked packaged app
        run: npm run pack

      - name: Run E2E real install + rollback against packaged app
        env:
          ENVSETUP_REAL_RUN: '1'
          ENVSETUP_PACKAGED_RUN: '1'
        run: npm run test:e2e:packaged
        timeout-minutes: 45

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-results-${{ matrix.os }}
          path: test-results/
          retention-days: 7

      - name: Upload task logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: task-logs-${{ matrix.os }}
          path: |
            test-results/envsetup-real-*-data/tasks/
            test-results/envsetup-real-*-data/*.log
          if-no-files-found: ignore
          retention-days: 7
