name: Release

on:
  push:
    tags: ['v*']

jobs:
  real-install:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
        tool: [node, java, python, git]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run real integration matrix
        env:
          ENVSETUP_REAL_RUN: '1'
          ENVSETUP_CI_TOOL: ${{ matrix.tool }}
        run: npm run test:integration:real -- --reporter=verbose
        timeout-minutes: 80

  build:
    needs: real-install
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build unpacked packaged app
        run: npm run pack

      - name: Run E2E real install + rollback against packaged app
        env:
          ENVSETUP_REAL_RUN: '1'
          ENVSETUP_PACKAGED_RUN: '1'
        run: npm run test:e2e:packaged
        timeout-minutes: 45

      - name: Build and package (without publish)
        run: npx electron-builder --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.blockmap
          if-no-files-found: ignore

  publish:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: false
          generate_release_notes: true
