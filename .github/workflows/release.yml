# 构建 EnvSetup 的发布产物，并执行打包应用的验证流程。

name: Release

on:
  push:
    tags: ['v*']

jobs:
  real-install:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            tool: node
            tool_version: 24.13.1
            version_id: 24-13-1
          - os: macos-latest
            tool: node
            tool_version: 22.22.1
            version_id: 22-22-1
          - os: macos-latest
            tool: java
            tool_version: 21.0.6+7
            version_id: 21-0-6-7
          - os: macos-latest
            tool: java
            tool_version: 17.0.14+7
            version_id: 17-0-14-7
          - os: macos-latest
            tool: python
            tool_version: 3.13.4
            version_id: 3-13-4
          - os: macos-latest
            tool: python
            tool_version: 3.12.10
            version_id: 3-12-10
          - os: macos-latest
            tool: git
            tool_version: 2.33.0
            version_id: 2-33-0
          - os: macos-latest
            tool: git
            tool_version: 2.32.0
            version_id: 2-32-0
          - os: macos-latest
            tool: mysql
            tool_version: 8.4.8
            version_id: 8-4-8
          - os: macos-latest
            tool: mysql
            tool_version: 8.4.7
            version_id: 8-4-7
          - os: macos-latest
            tool: redis
            tool_version: 7.4.7
            version_id: 7-4-7
          - os: macos-latest
            tool: redis
            tool_version: 7.4.6
            version_id: 7-4-6
          - os: macos-latest
            tool: maven
            tool_version: 3.9.11
            version_id: 3-9-11
          - os: macos-latest
            tool: maven
            tool_version: 3.9.10
            version_id: 3-9-10
          - os: windows-latest
            tool: node
            tool_version: 24.13.1
            version_id: 24-13-1
          - os: windows-latest
            tool: node
            tool_version: 22.22.1
            version_id: 22-22-1
          - os: windows-latest
            tool: java
            tool_version: 21.0.6+7
            version_id: 21-0-6-7
          - os: windows-latest
            tool: java
            tool_version: 17.0.14+7
            version_id: 17-0-14-7
          - os: windows-latest
            tool: python
            tool_version: 3.13.4
            version_id: 3-13-4
          - os: windows-latest
            tool: python
            tool_version: 3.12.10
            version_id: 3-12-10
          - os: windows-latest
            tool: git
            tool_version: 2.49.1
            version_id: 2-49-1
          - os: windows-latest
            tool: git
            tool_version: 2.48.2
            version_id: 2-48-2
          - os: windows-latest
            tool: mysql
            tool_version: 8.4.8
            version_id: 8-4-8
          - os: windows-latest
            tool: mysql
            tool_version: 8.4.7
            version_id: 8-4-7
          # Windows Redis 直装当前仅能从官方 Memurai LTS 页面拿到 7.4.7 对应安装器。
          - os: windows-latest
            tool: redis
            tool_version: 7.4.7
            version_id: 7-4-7
          - os: windows-latest
            tool: maven
            tool_version: 3.9.11
            version_id: 3-9-11
          - os: windows-latest
            tool: maven
            tool_version: 3.9.10
            version_id: 3-9-10
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    env:
      ENVSETUP_DOWNLOAD_CACHE_DIR: ${{ github.workspace }}/.envsetup-cache/downloads/${{ matrix.os }}-${{ matrix.tool }}-${{ matrix.version_id }}
      ENVSETUP_EXTRACTED_CACHE_DIR: ${{ github.workspace }}/.envsetup-cache/extracted/${{ matrix.os }}-${{ matrix.tool }}-${{ matrix.version_id }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Restore EnvSetup artifact caches
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ENVSETUP_DOWNLOAD_CACHE_DIR }}
            ${{ env.ENVSETUP_EXTRACTED_CACHE_DIR }}
          key: envsetup-artifacts-${{ matrix.os }}-${{ matrix.tool }}-${{ matrix.version_id }}-${{ hashFiles('package-lock.json', 'src/main/core/download.ts', 'src/main/core/archiveCache.ts', 'src/main/core/gitVersions.ts', 'src/main/core/mysqlVersions.ts', 'src/main/core/redisVersions.ts', 'src/main/plugins/nodeEnvPlugin.ts', 'src/main/plugins/javaEnvPlugin.ts', 'src/main/plugins/pythonEnvPlugin.ts', 'src/main/plugins/gitEnvPlugin.ts', 'src/main/plugins/mysqlEnvPlugin.ts', 'src/main/plugins/redisEnvPlugin.ts', 'src/main/plugins/mavenEnvPlugin.ts', 'tests/integration/action-real-cycle-matrix.test.ts', 'tests/integration/action-real-rollback-matrix.test.ts', '.github/workflows/release.yml') }}
          restore-keys: |
            envsetup-artifacts-${{ matrix.os }}-${{ matrix.tool }}-${{ matrix.version_id }}-
            envsetup-artifacts-${{ matrix.os }}-${{ matrix.tool }}-
            envsetup-artifacts-${{ matrix.os }}-

      - run: npm ci

      - name: Run real integration matrix
        env:
          ENVSETUP_REAL_RUN: '1'
          ENVSETUP_CI_TOOL: ${{ matrix.tool }}
          ENVSETUP_CI_VERSION: ${{ matrix.tool_version }}
        run: npm run test:integration:real -- --reporter=verbose
        timeout-minutes: 80

  build:
    needs: real-install
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}
    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.playwright-browsers/${{ matrix.os }}
      ENVSETUP_DOWNLOAD_CACHE_DIR: ${{ github.workspace }}/.envsetup-cache/downloads/${{ matrix.os }}-packaged
      ENVSETUP_EXTRACTED_CACHE_DIR: ${{ github.workspace }}/.envsetup-cache/extracted/${{ matrix.os }}-packaged

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Restore Playwright browser cache
        uses: actions/cache@v4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: playwright-browsers-${{ matrix.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-browsers-${{ matrix.os }}-

      - name: Restore EnvSetup artifact caches
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ENVSETUP_DOWNLOAD_CACHE_DIR }}
            ${{ env.ENVSETUP_EXTRACTED_CACHE_DIR }}
          key: envsetup-packaged-artifacts-${{ matrix.os }}-${{ hashFiles('package-lock.json', 'src/main/core/download.ts', 'src/main/core/archiveCache.ts', 'src/main/plugins/nodeEnvPlugin.ts', 'src/main/plugins/javaEnvPlugin.ts', 'src/main/plugins/pythonEnvPlugin.ts', 'src/main/plugins/gitEnvPlugin.ts', 'src/main/plugins/mysqlEnvPlugin.ts', 'src/main/plugins/redisEnvPlugin.ts', 'src/main/plugins/mavenEnvPlugin.ts', 'tests/e2e/real-install.spec.ts', '.github/workflows/release.yml') }}
          restore-keys: |
            envsetup-packaged-artifacts-${{ matrix.os }}-
            envsetup-artifacts-${{ matrix.os }}-

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build unpacked packaged app
        run: npm run pack

      - name: Run E2E real install + rollback against packaged app
        env:
          ENVSETUP_REAL_RUN: '1'
          ENVSETUP_PACKAGED_RUN: '1'
        run: npm run test:e2e:packaged
        timeout-minutes: 45

      - name: Build and package (without publish)
        run: npx electron-builder --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.blockmap
          if-no-files-found: ignore

  publish:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: false
          generate_release_notes: true
