appId: com.envsetup.app
productName: 开工吧

artifactName: 'EnvSetup-${version}-${os}-${arch}.${ext}'

publish:
  provider: github

directories:
  output: dist
  buildResources: build

files:
  - out/**/*
  - fixtures/templates/**/*

mac:
  icon: build/icon.icns
  category: public.app-category.developer-tools
  target:
    - dmg
    - zip

win:
  icon: build/icon.ico
  target:
    - nsis
    - portable

linux:
  icon: build/icon.png
  category: Development
  target:
    - AppImage
    - deb
